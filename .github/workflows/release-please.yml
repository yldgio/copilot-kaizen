on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # release-please-action v5 (release-please core 17.6.0). Pinned to v5
      # because @v4 saw an upstream regression. The action can still fail
      # intermittently due to a GitHub GraphQL bug in the "Fetching merge
      # commits" step — see https://github.com/googleapis/release-please/issues/2577
      # (closed but unresolved as of 2025-09). continue-on-error keeps the
      # workflow green; a transient failure just means no release PR this
      # push — the next push will retry.
      - uses: googleapis/release-please-action@v5
        id: release
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}

      - run: npm publish
        if: ${{ steps.release.outputs.release_created }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
